name: Build and Publish RSS

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 * * * *"   # hourly to start; change to */5 after you see scheduled runs

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site artifacts
        run: |
          mkdir -p public
          python scripts/aggregate.py
          # publish the feed(s) into public/ so Pages deploy is clean
          cp feed.xml public/feed.xml
          cp feed.xml public/feed-alt.xml
          echo "ok" > public/index.html

      - name: Validate RSS XML
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("public/feed.xml")
          print("XML OK")
          PY

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
