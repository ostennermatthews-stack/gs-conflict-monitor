  - escalation
  - tensions
  - retaliation
  - counterstrike
  - reprisal
  - "tit-for-tat"
  - ceasefire
  - truce
  - emergency
  - "state of emergency"
  - "emergency alert"
  - alert
  - warning
  - "security alert"
  - "heightened security"
  - curfew
  - lockdown
  - evacuation
  - evacuated
  - shelter
  - siren
  - "civil defense"
  - "civil defence"
  - "early warning"

  # Kinetic activity / weapons
  - attack
  - attacked
  - strike
  - strikes
  - airstrike
  - "air strike"
