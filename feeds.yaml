title: "GS MENA Conflict News Monitor"
description: "Consolidated RSS feed for monitoring US–Iran escalation and regional military/security impacts (incl. UAE)."

feeds:
  - name: "Al Jazeera"
    url: "https://www.aljazeera.com/xml/rss/all.xml"
  - name: "Al-Monitor"
    url: "https://www.al-monitor.com/rss"
  - name: "Al Bawaba"
    url: "https://www.albawaba.com/rss/all"
  - name: "Middle East Eye"
    url: "https://www.middleeasteye.net/rss"
  - name: "Middle East Monitor"
    url: "https://www.middleeastmonitor.com/feed/"
  - name: "Times of Israel"
    url: "https://www.timesofisrael.com/feed/"

# Only include items that match at least ONE of these (case-insensitive substring match)
include_any:
